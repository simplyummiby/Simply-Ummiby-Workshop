<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d96d7b" />
  <title>Simply Ummiby Workshop</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="assets/images/simply-ummiby-logo-transparent.png" alt="Simply Ummiby logo" />
        <div>
          <h1>Simply Ummiby</h1>
          <p>Workshop</p>
        </div>
      </div>

      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-link active" data-view="dashboard"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><path d="M9 20v-6h6v6"/></svg></span> Dashboard</button>
        <button class="nav-link" data-view="workshop"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5 12 3l8 4.5-8 4.5-8-4.5Z"/><path d="M4 7.5V17l8 4 8-4V7.5"/><path d="M12 12v9"/></svg></span> Orders</button>
        <button class="nav-link" data-view="inventory"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5 12 3l8 4.5-8 4.5-8-4.5Z"/><path d="M4 7.5V17l8 4 8-4V7.5"/><path d="M12 12v9"/></svg></span> Inventory</button>
        <button class="nav-link" data-view="products"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5 12 3l8 3.5v11L12 21l-8-3.5v-11Z"/><path d="m4 6.5 8 4 8-4"/><path d="M12 10.5V21"/></svg></span> Products</button>
        <button class="nav-link" data-view="resources"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h10a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4Z"/><path d="M8 17h10"/><path d="M9 8h5"/><path d="M9 12h5"/></svg></span> Resources</button>
        <button class="nav-link" data-view="settings"><span class="nav-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1L7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg></span> Settings</button>
      </nav>

      <div class="sidebar-footer">
        <p>Local workspace</p>
        <span>Version 0.8.2.6</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <button class="menu-button" id="menuButton" aria-label="Open menu">☰</button>
        <div>
          <p class="eyebrow">Handmade production & inventory</p>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="topbar-actions">
          <button class="button secondary" id="backupButton">Download Backup</button>
          <button class="button primary" data-action="new-order">+ New Order</button>
        </div>
      </header>

      <section id="viewContainer" class="view-container" aria-live="polite"></section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-heading">
        <h3 id="modalTitle">Confirm</h3>
        <button class="icon-button" id="modalClose" aria-label="Close">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </section>
  </div>

  <template id="dashboardTemplate">
    <section class="hero-panel">
      <div>
        <p class="eyebrow">Today in your workshop</p>
        <h3>Good day, Sherrie. Your workshop is ready.</h3>
        <p>Start an order, resume production, or handle anything that needs restocking.</p>
      </div>
      <img src="assets/images/simply-ummiby-logo-transparent.png" alt="" />
    </section>

    <section class="focus-panel panel" id="todayFocus"></section>
    <section class="metric-grid" id="metricGrid"></section>

    <section class="dashboard-grid">
      <article class="panel">
        <div class="panel-heading">
          <div><p class="eyebrow">Needs attention</p><h3>Inventory alerts</h3></div>
          <button class="text-button" data-view="inventory">View inventory</button>
        </div>
        <div id="inventoryAlerts"></div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <div><p class="eyebrow">Get moving</p><h3>Quick actions</h3></div>
        </div>
        <div class="quick-actions">
          <button class="quick-card" data-action="new-order"><strong>New order</strong><span>Add an Etsy order manually</span></button>
          <button class="quick-card" data-action="resume-focus"><strong>Resume production</strong><span>Continue the most recently touched item</span></button>
          <button class="quick-card" data-action="inventory-category" data-category="prepared-components"><strong>Build Ready Packs</strong><span>Prepare product packs from stocked materials</span></button>
          <button class="quick-card" data-view="resources"><strong>Print resources</strong><span>Care sheets, stickers, and shortcuts</span></button>
        </div>
      </article>
    </section>

    <section class="dashboard-grid lower">
      <article class="panel">
        <div class="panel-heading">
          <div><p class="eyebrow">Order flow</p><h3>Active orders</h3></div>
          <button class="text-button" data-view="workshop">Open orders</button>
        </div>
        <div id="activeOrders"></div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <div><p class="eyebrow">Recent changes</p><h3>Activity</h3></div>
        </div>
        <div id="activityFeed"></div>
      </article>
    </section>
  </template>

  <template id="newOrderTemplate">
    <section class="page-section wide">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Manual Etsy order</p>
          <h3 id="orderFormTitle">Create an order</h3>
          <p>Add every product in this Etsy order. Each physical item will be tracked independently.</p>
        </div>
      </div>

      <form id="newOrderForm" class="order-form panel">
        <div class="form-grid">
          <label>Customer name<input name="customerName" required /></label>
          <label>Etsy order number<input name="etsyOrderNumber" required /></label>
          <label>Ship By Date<input name="shipByDate" type="date" required /></label>
          <label class="full-width">Order notes<textarea name="notes" rows="3" placeholder="Deadline, custom request, or anything important..."></textarea></label>
        </div>

        <div class="form-divider"></div>
        <div class="item-builder-heading">
          <div><p class="eyebrow">Products</p><h4>Items in this order</h4></div>
          <button type="button" class="button secondary" id="addLineItem">+ Add Product</button>
        </div>
        <div id="lineItems" class="line-items"></div>

        <div class="form-actions">
          <button type="button" class="button secondary" data-view="workshop">Cancel</button>
          <button type="submit" class="button primary">Save Order</button>
        </div>
      </form>
    </section>
  </template>

  <template id="workshopTemplate">
    <section class="page-section wide orders-page">
      <section class="orders-banner" aria-labelledby="ordersBannerTitle">
        <div class="orders-banner-copy">
          <p class="eyebrow">Simply Ummiby Workshop</p>
          <h3 id="ordersBannerTitle">Orders</h3>
          <p>From planning to shipping, every order in one place.</p>
        </div>
      </section>

      <section class="orders-metric-grid" id="ordersMetricGrid"></section>

      <section class="orders-panel panel">
        <div class="orders-section-heading">
          <div><p class="eyebrow">Order management</p><h3>Active Orders <span class="orders-count" id="ordersCount"></span></h3></div>
          <button class="button primary" data-action="new-order">+ New Order</button>
        </div>
        <div class="orders-toolbar" id="workshopFilters"></div>
        <div id="workshopOrders"></div>
      </section>
    </section>
  </template>

  <template id="orderWorkspaceTemplate">
    <section class="page-section wide order-workspace-page">
      <div id="orderWorkspace"></div>
    </section>
  </template>

  <template id="placeholderTemplate">
    <section class="placeholder-page">
      <div class="placeholder-icon">SU</div>
      <p class="eyebrow">Planned module</p>
      <h3></h3>
      <p class="placeholder-copy"></p>
      <div class="placeholder-card"></div>
    </section>
  </template>

  <script src="js/data/sample-data.js"></script>
  <script src="js/data/workshop-recipes.js"></script>
  <script src="js/data/inventory-catalog.js"></script>
  <script src="js/data/product-masters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
